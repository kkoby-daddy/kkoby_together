<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Together 놀이터 Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Orbit&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-gradient: linear-gradient(135deg, #0f1115 0%, #1a1d26 100%);
    --card-bg: rgba(35, 42, 54, 0.7);
    --border: 1px solid rgba(255, 255, 255, 0.1);
    --accent: #6aa0ff;
    --accent-glow: rgba(106, 160, 255, 0.3);
    --text-main: #e8ecf3;
    --text-sub: #8a9099;
    --ok: #35c759; --warn: #ffb300; --bad: #ff5171;
    --font-main: 'Noto Sans KR', sans-serif;
    --font-tech: 'Orbit', sans-serif;
    --radius: 16px;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0; background: var(--bg-gradient); color: var(--text-main); 
    font-family: var(--font-main); min-height: 100vh;
  }

  /* 스크롤바 커스텀 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
  
  /* 헤더 스타일 */
  header {
    display: flex; align-items: center; justify-content: space-between; 
    padding: 14px 24px; background: rgba(15, 17, 21, 0.8); 
    backdrop-filter: blur(10px); border-bottom: var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { font-family: var(--font-tech); font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  
  /* 메인 그리드 레이아웃 (좌우 카드 높이 동기화 - stretch 적용) */
  .grid { 
    max-width: 1400px; margin: 24px auto; padding: 0 20px; 
    display: grid; grid-template-columns: 360px 1fr; gap: 20px; 
    align-items: stretch; /* 우측 높이에 맞춰 좌측 높이도 자동으로 늘어남 */
  }
  .full-width { grid-column: 1 / -1; }
  
  /* 카드 (패널) 스타일 */
  .card {
    background: var(--card-bg); border: var(--border); border-radius: var(--radius); 
    padding: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card h3 { 
    margin: 0 0 16px; font-size: 16px; font-family: var(--font-tech); 
    color: var(--accent); display: flex; align-items: center; gap: 8px; 
  }
  .card h3::before { content:''; display:block; width: 4px; height: 16px; background: var(--accent); border-radius: 2px; }

  /* 좌측 카드 전용 (Flex 설정으로 리스트가 남은 공간 채우게 함) */
  .card-left { display: flex; flex-direction: column; }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .col { flex: 1 1 0; }
  
  label { display: block; font-size: 13px; color: var(--text-sub); margin: 6px 0 6px 4px; }
  
  /* 입력 폼 스타일 */
  input, textarea, select {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3); color: var(--text-main); outline: none; font-size: 14px;
    font-family: var(--font-main); transition: 0.2s;
  }
  input[type="number"] { font-family: var(--font-tech); font-weight: 500; letter-spacing: 0.5px; }
  input:focus, textarea:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }
  textarea { min-height: 84px; resize: vertical; }
  input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; margin: 0; }

  /* 버튼 스타일 */
  .btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: var(--text-main); cursor: pointer;
    font-weight: 500; font-family: var(--font-main); transition: all 0.2s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }
  
  .btn.primary { background: var(--accent); color: #000; border: none; font-weight: 700; }
  .btn.primary:hover { box-shadow: 0 0 15px var(--accent-glow); background: #82aeff; }
  .btn.primary:disabled { background: #445; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }
  
  .btn.ghost { background: transparent; }
  .btn.ghost:hover { background: rgba(255,255,255,0.08); }
  
  .btn.warn { border-color: var(--bad); background: rgba(255,81,113,0.1); color: var(--bad); }
  .btn.warn:hover { background: rgba(255,81,113,0.2); }
  
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  
  /* 칩(필터) 스타일 */
  .filter-btn { border-radius: 6px; font-size: 12px; padding: 6px 12px; }
  .filter-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); font-weight: 700; }

  /* 리스트 스타일 (flex-grow를 이용해 높이 자동 조절) */
  .list { 
    flex: 1 1 0; /* 부모(card-left)의 남은 세로 공간을 모두 차지함 */
    min-height: 500px; /* 기본 최소 높이 보장 */
    overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); 
    border-radius: 12px; background: rgba(0,0,0,0.2); padding: 6px; 
  }
  .item { padding: 12px 14px; border-radius: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(255,255,255,0.05); border-color: transparent; }
  
  .muted { color: var(--text-sub); }
  .tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 3px 8px; border: 1px solid transparent; }
  .tag.ok { color: var(--ok); background: rgba(53,199,89,0.1); border-color: var(--ok); }
  .tag.warn { color: var(--warn); background: rgba(255,179,0,0.1); border-color: var(--warn); }
  .tag.bad { color: var(--bad); background: rgba(255,81,113,0.1); border-color: var(--bad); }
  
  .grid2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  
  .hr { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
  
  .note { font-size: 12px; color: var(--text-sub); line-height: 1.4; }
  
  /* 콜아웃 (정보 패널) */
  .callout { border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); border-radius: 12px; padding: 14px 16px; line-height: 1.5; font-size: 14px; }
  .callout.bad { border-color: rgba(255,81,113,0.5); background: rgba(255,81,113,0.05); }
  .callout.ok { border-color: rgba(53,199,89,0.5); background: rgba(53,199,89,0.05); }
  
  .right { display: flex; gap: 10px; align-items: center; }
  .mono { font-family: var(--font-tech); letter-spacing: 0.5px; }

  /* ===== 8확정 리스트 정렬 고정 (다중 컬럼 그리드 적용) ===== */
  .r8list { 
    max-height: 40vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); 
    border-radius: 12px; background: rgba(0,0,0,0.2); padding: 12px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; align-content: start;
  }
  .r8item {
    display: grid; grid-template-columns: auto 1fr auto; 
    gap: 12px; align-items: center; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.03); 
    border-radius: 8px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.01);
  }
  .r8item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
  .r8item.disabled { opacity: 0.4; cursor: not-allowed; }
  .r8item.disabled:hover { background: rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.03); }
  .r8item .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r8item .extra { display: flex; gap: 6px; align-items: center; justify-self: end; flex-wrap: wrap; }

  /* 커스텀 체크박스 래퍼 */
  .chk-label { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-main); cursor: pointer; user-select: none; }

  /* 모바일 최적화 */
  @media (max-width: 780px) {
    .grid { grid-template-columns: 1fr; gap: 16px; margin: 16px auto; padding: 0 16px; }
    header { flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
    /* 모바일에서는 높이 고정으로 변경하여 레이아웃 붕괴 방지 */
    .list { flex: none; max-height: 40vh; min-height: auto; }
    .r8list { max-height: 40vh; grid-template-columns: 1fr; }
    input, textarea, select { font-size: 15px; padding: 14px; }
    .btn { padding: 12px 16px; font-size: 15px; }
    .grid2 { grid-template-columns: repeat(2, 1fr); }
    .grid3 { grid-template-columns: repeat(2, 1fr); }
  }

  /* === 비밀번호 게이트 === */
  body.locked { overflow: hidden; }
  body.locked header, body.locked .grid { display: none; }
  
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15,17,21,0.8); backdrop-filter: blur(8px);
  }
  
  #gate .panel {
    width: min(380px, 92vw); background: var(--card-bg); border: var(--border); 
    border-radius: var(--radius); padding: 30px 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center;
  }
  #gate h2 { margin: 0 0 8px; font-size: 22px; font-family: var(--font-tech); color: var(--accent); }
  #gate .input-row { display: flex; gap: 10px; margin-top: 10px; }
  #gate input[type="password"] {
    flex: 1; padding: 14px; border-radius: 10px; border: var(--border); background: rgba(0,0,0,0.4); 
    color: var(--text-main); outline: none; font-size: 15px; letter-spacing: 2px;
  }
  #gate button {
    padding: 0 20px; border-radius: 10px; border: none; background: var(--accent); 
    color: #000; font-weight: 700; cursor: pointer; transition: 0.2s;
  }
  #gate button:hover { box-shadow: 0 0 15px var(--accent-glow); }
  #gate .err { margin-top: 12px; color: var(--bad); font-size: 13px; min-height: 18px; font-weight: 500; }
</style>
</head>
<body class="locked">

<script>
// ----- 로그인 처리 -----
const ADMIN_PASSWORD_HASH = "67014614aeb1b3c1f8be8cb87b930f3e36683d403a928e8a49388c6d3021670f";
const LOGIN_TTL_MS = 2 * 60 * 60 * 1000;

async function sha256Hex(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getSess(){ try{ return JSON.parse(sessionStorage.getItem("Together_admin_ok")||"null"); }catch{ return null; } }
function setSess(){ sessionStorage.setItem("Together_admin_ok", JSON.stringify({h:ADMIN_PASSWORD_HASH, t:Date.now()})); }
function sessValid(){ const s = getSess(); return !!(s && s.h===ADMIN_PASSWORD_HASH && (Date.now()-s.t) < LOGIN_TTL_MS); }
function unlock(){ document.body.classList.remove("locked"); const g = document.getElementById("gate"); if(g) g.remove(); }

document.addEventListener("DOMContentLoaded", ()=>{
  const pass = document.getElementById("gate_pass");
  const btn  = document.getElementById("gate_btn");
  const err  = document.getElementById("gate_err");

  if(sessValid()){ unlock(); return; }

  async function tryLogin(){
    err.textContent = ""; const p = pass.value ?? "";
    if(!p){ err.textContent="비밀번호를 입력하세요."; pass.focus(); return; }
    try{
      const hex = await sha256Hex(p);
      if(hex === ADMIN_PASSWORD_HASH){
        setSess(); // 체크박스 없이 무조건 2시간(세션) 유지
        unlock();
      }else{
        err.textContent = "비밀번호가 올바르지 않습니다.";
        pass.value = ""; pass.focus();
      }
    }catch(e){
      err.textContent = "브라우저가 WebCrypto를 지원하지 않습니다."; console.error(e);
    }
  }

  btn.addEventListener("click", tryLogin);
  pass.addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });
  setTimeout(()=>pass.focus(), 0);
});
</script>

<script>
/* ====== 설정 ====== */
const GH_OWNER  = "kkoby-daddy";
const GH_REPO   = "kkoby_together";
const GH_BRANCH = "main";
const PETS_PATH = "data/pets.json";
const R8_PATH   = "data/guaranteed_rank8.full.json";
const REMOTE_PETS = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${PETS_PATH}`;
const REMOTE_R8   = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${R8_PATH}`;

const LS_KEY = "adminPetsCache_v2";

/* ====== 상태 ====== */
let DB = {}; let ORDER = []; let CURRENT = null;
let currentFilter = 'all'; let currentR8Filter = 'all';
let R8_DB = {}; let R8_RESULT = {}; let R8_REMOTE_SHA = null;
let selectedListPets = new Set(); 

/* ====== 유틸 ====== */
function fetchJSON(url){
  return fetch(url + `?v=${Date.now()}`, {cache:"no-store"})
    .then(async r => {
      if(r.status === 404) return {__404__:true};
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    });
}
function saveLS(){ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
function loadLS(){ try{ const s=localStorage.getItem(LS_KEY); return s? JSON.parse(s):null; }catch{ return null; } }
function sortNames(){ ORDER = Object.keys(DB).sort((a,b)=>a.localeCompare(b,'ko')); }
function $(id){ return document.getElementById(id); }
const num = (v)=> (v===""||v==null||isNaN(+v)) ? null : +v;
const floor4 = (a)=> a.map(x=>Math.floor(x??NaN));
function toFixed2(x){ return new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP).toNumber(); }

/* ====== 추정/검증 로직 ====== */
const ESET = Array.from({ length: (650 - 400) + 1 }, (_, i) => 650 - i);

function s0_from_k_u_jjyal(k, u){
  const fac = k/100;
  const vhp  = (u.hp + 4.5) * fac; const vatk = (u.atk+ 4.5) * fac;
  const vdef = (u.def+ 4.5) * fac; const vagi = (u.agi+ 4.5) * fac;
  const s_hp = Math.floor(vhp*4 + vatk + vdef + vagi);
  const s_atk= Math.floor(vhp*0.1 + vatk + vdef*0.1 + vagi*0.05);
  const s_def= Math.floor(vhp*0.1 + vatk*0.1 + vdef + vagi*0.05);
  const s_agi= Math.floor(vagi);
  return [s_hp,s_atk,s_def,s_agi];
}

function solveUFromSG_STRICT(SG,e){
  try{
    if(!SG || ![SG.hp,SG.atk,SG.def,SG.agi].every(Number.isFinite)) return null;
    Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });

    const eD = new Decimal(e); const f  = eD.dividedBy(10000);
    const u_agi = new Decimal(SG.agi).times(10000).dividedBy(eD).minus(4.5).round();
    const dPlus45 = u_agi.plus(4.5);

    const rhs1 = new Decimal(SG.hp).minus( dPlus45.times(f) ).dividedBy(f);
    const rhs2 = new Decimal(SG.atk).minus( dPlus45.times(f).times(0.05) ).dividedBy(f);
    const rhs3 = new Decimal(SG.def).minus( dPlus45.times(f).times(0.05) ).dividedBy(f);

    let A = [
      [ new Decimal(4),   new Decimal(1),   new Decimal(1),   rhs1 ],
      [ new Decimal(0.1), new Decimal(1),   new Decimal(0.1), rhs2 ],
      [ new Decimal(0.1), new Decimal(0.1), new Decimal(1),   rhs3 ],
    ];
    for(let i=0;i<3;i++){
      let mr=i; let mv=A[i][i].abs();
      for(let j=i+1;j<3;j++){ const t=A[j][i].abs(); if(t.greaterThan(mv)){mr=j; mv=t;} }
      if(mr!==i){ const tmp=A[i]; A[i]=A[mr]; A[mr]=tmp; }
      const piv=A[i][i];
      for(let j=i;j<4;j++) A[i][j]=A[i][j].dividedBy(piv);
      for(let k=0;k<3;k++){
        if(k===i) continue;
        const fac=A[k][i];
        for(let j=i;j<4;j++) A[k][j]=A[k][j].minus( fac.times(A[i][j]) );
      }
    }
    const aPrime=A[0][3], bPrime=A[1][3], cPrime=A[2][3];
    const u_hp  = aPrime.minus(4.5).round();
    const u_atk = bPrime.minus(4.5).round();
    const u_def = cPrime.minus(4.5).round();

    const r2 = x => new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP);
    const hp_chk  = r2( f.times( (u_hp.plus(4.5)).times(4).plus(u_atk.plus(4.5)).plus(u_def.plus(4.5)).plus(u_agi.plus(4.5)) ) );
    const atk_chk = r2( f.times( (u_hp.plus(4.5)).times(0.1).plus(u_atk.plus(4.5)).plus(u_def.plus(4.5).times(0.1)).plus(u_agi.plus(4.5).times(0.05)) ) );
    const def_chk = r2( f.times( (u_hp.plus(4.5)).times(0.1).plus(u_atk.plus(4.5).times(0.1)).plus(u_def.plus(4.5)).plus(u_agi.plus(4.5).times(0.05)) ) );
    const agi_chk = r2( f.times( u_agi.plus(4.5) ) );

    const ok = hp_chk.eq(r2(SG.hp)) && atk_chk.eq(r2(SG.atk)) && def_chk.eq(r2(SG.def)) && agi_chk.eq(r2(SG.agi));
    if(!ok) return null;

    return { u:{hp:+u_hp, atk:+u_atk, def:+u_def, agi:+u_agi}, e:+e };
  }catch{ return null; }
}

function inferKU_STRICT(S0, SG){
  const S0int = S0.map(x=>Math.floor(x));
  for(const e of ESET){
    const sol = solveUFromSG_STRICT(SG, e);
    if(!sol) continue;
    for(let k=10;k<=100;k++){
      const s = s0_from_k_u_jjyal(k, sol.u);
      if(s[0]===S0int[0] && s[1]===S0int[1] && s[2]===S0int[2] && s[3]===S0int[3]){
        return {k:Math.round(k), u:sol.u, e:sol.e};
      }
    }
  }
  return null;
}

function computeS0RealFromKU(k, u){
  Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });
  const fac = new Decimal(k).dividedBy(100);
  const hpB  = new Decimal(u.hp).plus(4.5).times(fac);
  const atkB = new Decimal(u.atk).plus(4.5).times(fac);
  const defB = new Decimal(u.def).plus(4.5).times(fac);
  const agiB = new Decimal(u.agi).plus(4.5).times(fac);

  const hp  = hpB.times(4).plus(atkB).plus(defB).plus(agiB);
  const atk = hpB.times(0.1).plus(atkB).plus(defB.times(0.1)).plus(agiB.times(0.05));
  const def = hpB.times(0.1).plus(atkB.times(0.1)).plus(defB).plus(agiB.times(0.05));
  const agi = agiB;
  return { hp, atk, def, agi };
}

function computeSGRealFromKU(u, SG){
  Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });
  const uAgiPlus = new Decimal(u.agi).plus(4.5);
  const e = new Decimal(SG.agi).times(10000).dividedBy(uAgiPlus);
  const fac = e.dividedBy(10000);
  const uHpP  = new Decimal(u.hp).plus(4.5);
  const uAtkP = new Decimal(u.atk).plus(4.5);
  const uDefP = new Decimal(u.def).plus(4.5);

  const hp  = fac.times( uHpP.times(4).plus(uAtkP).plus(uDefP).plus(uAgiPlus) );
  const atk = fac.times( uHpP.times(0.1).plus(uAtkP).plus(uDefP.times(0.1)).plus(uAgiPlus.times(0.05)) );
  const def = fac.times( uHpP.times(0.1).plus(uAtkP.times(0.1)).plus(uDefP).plus(uAgiPlus.times(0.05)) );
  const agi = fac.times( uAgiPlus );
  return { e, hp, atk, def, agi };
}

function collectR8ObsForKU(k,u){
  Decimal.set({ precision:30, rounding: Decimal.ROUND_HALF_UP });
  const fac = new Decimal(k).dividedBy(100);
  const seen = new Map();

  for(let ar=-2; ar<=2; ar++){
    for(let dr=-2; dr<=2; dr++){
      for(let gr=-2; gr<=2; gr++){
        for(let hr=-2; hr<=2; hr++){
          for(let ab=0; ab<=10; ab++){
            for(let db=0; db<=10; db++){
              for(let gb=0; gb<=10; gb++){
                const hb = 10 - ab - db - gb;
                if(hb < 0 || hb > 10) continue;

                const baseA = new Decimal(u.atk + ar + ab);
                const baseD = new Decimal(u.def + dr + db);
                const baseG = new Decimal(u.agi + gr + gb);
                const baseH = new Decimal(u.hp  + hr + hb);

                const iA = baseA.times(fac); const iD = baseD.times(fac);
                const iG = baseG.times(fac); const iH = baseH.times(fac);

                const atk = iH.times(0.1).plus(iA).plus(iD.times(0.1)).plus(iG.times(0.05)).floor().toNumber();
                const def = iH.times(0.1).plus(iA.times(0.1)).plus(iD).plus(iG.times(0.05)).floor().toNumber();
                const agi = iG.floor().toNumber();
                const hp  = iH.times(4).plus(iA).plus(iD).plus(iG).floor().toNumber();

                const key = `${hp},${atk},${def},${agi}`;
                let s = seen.get(key);
                if(!s){ s = new Set(); seen.set(key, s); }
                s.add(ar + dr + gr + hr);
              }
            }
          }
        }
      }
    }
  }
  const out = [];
  for(const [key, set] of seen.entries()){
    if(set.size===1 && set.has(8)){ out.push(key.split(',').map(n=>+n)); }
  }
  out.sort((a,b)=> a[0]-b[0] || a[1]-b[1] || a[2]-b[2] || a[3]-b[3]);
  return out;
}

/* ====== UI 렌더 ====== */
const listEl = $("list"), searchEl = $("search");

function renderList(){
  const kw = (searchEl.value||"").trim();

  const filteredOrder = ORDER.filter(n => {
    const row = DB[n] || {};
    if (currentFilter === 'no_s0sg') {
      const s0ok = row.s0 && Number.isFinite(row.s0.hp) && Number.isFinite(row.s0.atk) && Number.isFinite(row.s0.def) && Number.isFinite(row.s0.agi);
      const sgok = row.sg && Number.isFinite(row.sg.hp) && Number.isFinite(row.sg.atk) && Number.isFinite(row.sg.def) && Number.isFinite(row.sg.agi);
      return !s0ok || !sgok;
    }
    if (currentFilter === 'no_ku') {
      return !(row?.ku_override || (Number.isFinite(row?.k) && row?.u));
    }
    return true; 
  });

  const show = filteredOrder.filter(n => kw ? n.includes(kw) : true);

  listEl.innerHTML = "";
  if(show.length===0){
    const d = document.createElement('div'); d.className="item"; d.textContent="결과 없음";
    listEl.appendChild(d); return;
  }
  
  for(const n of show){
    const row = DB[n]||{};
    const it = document.createElement('div'); it.className="item";
    
    // 좌측 컨테이너 (체크박스 + 이름)
    const leftWrap = document.createElement('div');
    leftWrap.style.display = "flex"; leftWrap.style.alignItems = "center"; leftWrap.style.gap = "10px";
    
    const cb = document.createElement('input');
    cb.type = "checkbox"; cb.className = "list-pet-cb"; cb.value = n;
    cb.checked = selectedListPets.has(n);
    cb.onclick = (e) => { 
      e.stopPropagation(); 
      if(cb.checked) selectedListPets.add(n); else selectedListPets.delete(n);
    };

    const nameNode = document.createElement('div'); 
    nameNode.textContent = n; nameNode.style.fontWeight = "500";
    
    leftWrap.appendChild(cb);
    leftWrap.appendChild(nameNode);

    // 우측 태그들
    const right = document.createElement('div'); right.className="tags";
    
    const s0ok = row.s0 && Number.isFinite(row.s0.hp) && Number.isFinite(row.s0.atk) && Number.isFinite(row.s0.def) && Number.isFinite(row.s0.agi);
    const sgok = row.sg && Number.isFinite(row.sg.hp) && Number.isFinite(row.sg.atk) && Number.isFinite(row.sg.def) && Number.isFinite(row.sg.agi);
    const s0sg_ok = s0ok && sgok;
    
    const t1 = document.createElement('span');
    t1.className = "tag " + (s0sg_ok ? "ok" : "warn");
    t1.textContent = s0sg_ok ? "S0/SG" : "미완";
    
    right.appendChild(t1);
    if(row?.ku_override || (Number.isFinite(row?.k) && row?.u)){
      const t2 = document.createElement('span'); t2.className="tag warn"; t2.textContent="k/u";
      right.appendChild(t2);
    }
    
    it.appendChild(leftWrap); it.appendChild(right);
    it.addEventListener('click', ()=>loadForm(n));
    listEl.appendChild(it);
  }
}

// 리스트 선택 컨트롤
$("btnListSelectAll").addEventListener("click", () => {
  document.querySelectorAll("#list .list-pet-cb").forEach(cb => {
    cb.checked = true;
    selectedListPets.add(cb.value);
  });
});
$("btnListClearAll").addEventListener("click", () => {
  document.querySelectorAll("#list .list-pet-cb").forEach(cb => {
    cb.checked = false;
    selectedListPets.delete(cb.value);
  });
});

// 리스트 일괄 k/u 추정
$("btnBulkSolve").addEventListener("click", () => {
  if(selectedListPets.size === 0) {
    alert("선택된 페트가 없습니다."); return;
  }
  
  let successCount = 0;
  let failCount = 0;
  
  for(const name of selectedListPets) {
    const r = DB[name];
    if(!r) continue;
    
    const S0 = r.s0; const SG = r.sg;
    const s0ok = S0 && Number.isFinite(S0.hp) && Number.isFinite(S0.atk) && Number.isFinite(S0.def) && Number.isFinite(S0.agi);
    const sgok = SG && Number.isFinite(SG.hp) && Number.isFinite(SG.atk) && Number.isFinite(SG.def) && Number.isFinite(SG.agi);
    
    if(!s0ok || !sgok) {
      failCount++; continue;
    }
    
    const sol = inferKU_STRICT([S0.hp, S0.atk, S0.def, S0.agi], SG);
    if(sol) {
      r.k = sol.k;
      r.u = sol.u;
      r.ku_override = true;
      successCount++;
    } else {
      failCount++;
    }
  }
  
  saveLS();
  renderList();
  renderR8List();
  if(CURRENT && selectedListPets.has(CURRENT)) {
    loadForm(CURRENT);
  }
  alert(`일괄 k/u 추정 완료!\n\n성공: ${successCount}건\n실패(불가/미완): ${failCount}건\n\n브라우저 저장 완료. 커밋하려면 [저장 후 커밋] 버튼을 누르세요.`);
});


function loadForm(name){
  CURRENT = name;
  const r = DB[name] || {};
  $("name").value = name;
  $("note").value = r.note || "";
  $("s0_hp").value  = r?.s0?.hp  ?? "";
  $("s0_atk").value = r?.s0?.atk ?? "";
  $("s0_def").value = r?.s0?.def ?? "";
  $("s0_agi").value = r?.s0?.agi ?? "";
  $("sg_hp").value  = r?.sg?.hp  ?? "";
  $("sg_atk").value = r?.sg?.atk ?? "";
  $("sg_def").value = r?.sg?.def ?? "";
  $("sg_agi").value = r?.sg?.agi ?? "";
  $("ovr_check").checked = !!r.ku_override;
  $("ku_k").value   = r?.k ?? "";
  $("ku_hp").value  = r?.u?.hp  ?? "";
  $("ku_atk").value = r?.u?.atk ?? "";
  $("ku_def").value = r?.u?.def ?? "";
  $("ku_agi").value = r?.u?.agi ?? "";
  updateConsistency();
  renderR8List(); 
}

function gatherForm(){
  const name = $("name").value.trim();
  const s0 = { hp: num($("s0_hp").value), atk: num($("s0_atk").value), def: num($("s0_def").value), agi: num($("s0_agi").value) };
  const sg = { hp: num($("sg_hp").value), atk: num($("sg_atk").value), def: num($("sg_def").value), agi: num($("sg_agi").value) };
  const ovr = $("ovr_check").checked;
  let k = num($("ku_k").value);
  let u = { hp: num($("ku_hp").value), atk: num($("ku_atk").value), def: num($("ku_def").value), agi: num($("ku_agi").value) };
  if(!ovr){ k = null; u = null; }
  return { name, s0, sg, ovr, k, u, note: $("note").value.trim() };
}

function updateConsistency(){
  const box = $("consistency");
  box.className = "callout"; box.style.display = "none";
  const f = gatherForm();
  const ready = f?.ovr && Number.isFinite(f.k) && f.u && [f.u.hp, f.u.atk, f.u.def, f.u.agi].every(Number.isFinite) &&
    [f.s0.hp, f.s0.atk, f.s0.def, f.s0.agi].every(Number.isFinite) && [f.sg.hp, f.sg.atk, f.sg.def, f.sg.agi].every(Number.isFinite);
  if(!ready){ box.innerHTML = ""; return; }

  const sPred = s0_from_k_u_jjyal(f.k, f.u);
  const sInt  = [f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi].map(v=>Math.floor(v));
  const okS0  = (sPred[0]===sInt[0] && sPred[1]===sInt[1] && sPred[2]===sInt[2] && sPred[3]===sInt[3]);

  try{
    Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });
    const e = new Decimal(f.sg.agi).times(10000).dividedBy(new Decimal(f.u.agi).plus(4.5));
    const fct = e.dividedBy(10000);
    const r2  = x => new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP);

    const hpC  = r2( fct.times( (f.u.hp+4.5)*4 + (f.u.atk+4.5) + (f.u.def+4.5) + (f.u.agi+4.5) ) ).toNumber();
    const atkC = r2( fct.times( (f.u.hp+4.5)*0.1 + (f.u.atk+4.5) + (f.u.def+4.5)*0.1 + (f.u.agi+4.5)*0.05 ) ).toNumber();
    const defC = r2( fct.times( (f.u.hp+4.5)*0.1 + (f.u.atk+4.5)*0.1 + (f.u.def+4.5) + (f.u.agi+4.5)*0.05 ) ).toNumber();

    const hpDiff  = toFixed2(hpC  - f.sg.hp);
    const atkDiff = toFixed2(atkC - f.sg.atk);
    const defDiff = toFixed2(defC - f.sg.def);

    const sgOk = (hpDiff===0 && atkDiff===0 && defDiff===0);
    const eVal = e.toNumber();

    box.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:6px">
        <strong style="color:var(--text-main);">일관성 검사</strong>
        <span class="mono muted">k=${f.k}, u=(${f.u.hp},${f.u.atk},${f.u.def},${f.u.agi})</span>
      </div>
      <div style="color:${okS0?'var(--ok)':'var(--bad)'}">S0 정수부 일치: <b>${okS0?'OK':'불일치'}</b> (예측 ${sPred.join('/')}, 실제 ${sInt.join('/')})</div>
      <div style="margin-top:6px">
        <div>SG 참고(e≈<span class="mono">${eVal.toFixed(2)}</span>): 
          HP <span class="mono">${hpC.toFixed(2)}</span> (${hpDiff>=0?'+':''}${hpDiff}),
          ATK <span class="mono">${atkC.toFixed(2)}</span> (${atkDiff>=0?'+':''}${atkDiff}),
          DEF <span class="mono">${defC.toFixed(2)}</span> (${defDiff>=0?'+':''}${defDiff})
        </div>
        <div style="color:${sgOk?'var(--ok)':'var(--bad)'}">SG 반올림 비교: <b>${sgOk?'OK':'차이 있음'}</b></div>
      </div>
      <div class="note" style="margin-top:8px; opacity:0.8;">※ k/u는 항상 <b>원래 u</b> 기준입니다.</div>
    `;
    box.classList.add(okS0 && sgOk ? "ok" : "bad");
    box.style.display = "block";
  }catch{
    box.innerHTML = `<b style="color:var(--bad)">일관성 검사 실패</b> (내부 계산 오류)`;
    box.classList.add("bad"); box.style.display = "block";
  }
}

function renderDecimalsPanel(){
  const box = $("decPanel");
  box.className = "callout"; box.style.display = "none"; box.innerHTML = "";

  const f = gatherForm();
  if(!f.name){ alert("이름을 먼저 입력하세요."); return; }
  if([f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi].some(v=>v==null) || [f.sg.hp,f.sg.atk,f.sg.def,f.sg.agi].some(v=>v==null)){
    alert("S0/SG를 모두 채운 뒤 사용해 주세요."); return;
  }

  let k = null, u = null, src = "";
  const hasOverride = f.ovr && Number.isFinite(f.k) && f.u && [f.u.hp,f.u.atk,f.u.def,f.u.agi].every(Number.isFinite);

  if(hasOverride){
    k = f.k; u = f.u; src = "override";
  }else{
    const sol = inferKU_STRICT([f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi], f.sg);
    if(!sol){
      box.classList.add("bad"); box.style.display = "block";
      box.innerHTML = `<b style="color:var(--bad)">소숫점 계산 실패</b><br>현재 S0/SG 조합으로는 STRICT 모드에서 k/u를 찾을 수 없습니다.<br>(필요하다면 수동 오버라이드 후 다시 시도해 주세요.)`;
      return;
    }
    k = sol.k; u = sol.u; src = "strict-auto";
  }

  const S0real = computeS0RealFromKU(k, u);
  const S0hp   = S0real.hp.toNumber(); const S0atk  = S0real.atk.toNumber();
  const S0def  = S0real.def.toNumber(); const S0agi  = S0real.agi.toNumber();
  
  $("s0_hp").value  = S0hp.toFixed(2); $("s0_atk").value = S0atk.toFixed(2);
  $("s0_def").value = S0def.toFixed(2); $("s0_agi").value = S0agi.toFixed(2);
  updateConsistency();
  
  const S0floor = { hp: Math.floor(S0hp), atk: Math.floor(S0atk), def: Math.floor(S0def), agi: Math.floor(S0agi) };
  const S0int = { hp: Math.floor(f.s0.hp), atk: Math.floor(f.s0.atk), def: Math.floor(f.s0.def), agi: Math.floor(f.s0.agi) };
  const okS0 = S0floor.hp===S0int.hp && S0floor.atk===S0int.atk && S0floor.def===S0int.def && S0floor.agi===S0int.agi;

  const SGreal = computeSGRealFromKU(u, f.sg);
  const eVal   = SGreal.e.toNumber();
  const r2 = x => new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP).toNumber();
  
  const SGhpR  = r2(SGreal.hp); const SGatkR = r2(SGreal.atk);
  const SGdefR = r2(SGreal.def); const SGagiR = r2(SGreal.agi);
  const diff = { hp: r2(SGhpR  - f.sg.hp), atk: r2(SGatkR - f.sg.atk), def: r2(SGdefR - f.sg.def), agi: r2(SGagiR - f.sg.agi) };
  const okSG = diff.hp===0 && diff.atk===0 && diff.def===0 && diff.agi===0;
  const modeLabel = src==="override" ? "오버라이드 k/u 사용" : src==="strict-auto" ? "S0/SG로 STRICT 자동 추정" : src;

  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px">
      <strong style="color:var(--text-main);">소숫점 역산 결과</strong><span class="mono muted">${modeLabel}</span>
    </div>
    <div class="mono muted" style="margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05);">
      k=${k}, u=(${u.hp},${u.atk},${u.def},${u.agi}), e≈${eVal.toFixed(2)}
    </div>
    <div style="margin-bottom:4px; color:var(--text-main);"><b>S0 (레벨1 실제 값)</b></div>
    <div class="note mono" style="margin-bottom:6px">
      HP ${S0hp.toFixed(6)} / ATK ${S0atk.toFixed(6)} / DEF ${S0def.toFixed(6)} / AGI ${S0agi.toFixed(6)}<br>
      → floor 기준: (${S0floor.hp}/${S0floor.atk}/${S0floor.def}/${S0floor.agi}), 표기 S0 정수: (${S0int.hp}/${S0int.atk}/${S0int.def}/${S0int.agi})
    </div>
    <div style="color:${okS0?'var(--ok)':'var(--bad)'}; margin-bottom:10px;">S0 정수 일치: <b>${okS0?'OK':'불일치'}</b></div>
    <div style="margin-top:12px; margin-bottom:4px; color:var(--text-main);"><b>SG (성장치 실제 값)</b></div>
    <div class="note mono" style="margin-bottom:6px">
      HP ${SGreal.hp.toNumber().toFixed(6)} → 표기 ${SGhpR.toFixed(2)} (Δ${diff.hp>=0?'+':''}${diff.hp})<br>
      ATK ${SGreal.atk.toNumber().toFixed(6)} → 표기 ${SGatkR.toFixed(2)} (Δ${diff.atk>=0?'+':''}${diff.atk})<br>
      DEF ${SGreal.def.toNumber().toFixed(6)} → 표기 ${SGdefR.toFixed(2)} (Δ${diff.def>=0?'+':''}${diff.def})<br>
      AGI ${SGreal.agi.toNumber().toFixed(6)} → 표기 ${SGagiR.toFixed(2)} (Δ${diff.agi>=0?'+':''}${diff.agi})
    </div>
    <div style="color:${okSG?'var(--ok)':'var(--bad)'}">SG 반올림 비교: <b>${okSG?'OK':'차이 있음'}</b></div>
    <div class="note" style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05); opacity:0.8;">
      ※ 이 값들은 floor/반올림 되기 <b>직전</b>의 내부 실수 값을 보여 줍니다.<br>※ S0 불일치나 SG 오차가 크면, S0/SG 입력 또는 k/u 설정을 다시 한 번 확인해 주세요.
    </div>
  `;
  box.classList.add(okS0 && okSG ? "ok" : "bad"); box.style.display = "block";
}

async function commitPets(){
  const token = prompt("GitHub Personal Access Token 입력(권한: repo, contents)");
  if(!token){ alert("토큰이 필요합니다."); return; }

  const metaUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(PETS_PATH)}?ref=${GH_BRANCH}`;
  const metaRes = await fetch(metaUrl, {headers:{Accept:"application/vnd.github+json"}});
  if(!metaRes.ok){ alert("원격 SHA 조회 실패: " + metaRes.status); return; }
  const meta = await metaRes.json(); const sha = meta.sha;

  const putRes = await fetch(metaUrl, {
    method:"PUT",
    headers:{ "Authorization":`Bearer ${token}`, "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify({
      message: prompt("커밋 메시지 입력", "chore(admin): update pets.json (manual ku override)") || "update pets.json",
      content: btoa(unescape(encodeURIComponent(JSON.stringify(DB, null, 2)))), branch: GH_BRANCH, sha
    })
  });
  if(!putRes.ok){ const t = await putRes.text().catch(()=>"(no body)"); alert("커밋 실패: " + putRes.status + "\n" + t); return; }
  alert("pets.json 커밋 성공!");
}

/* ====== R8 UI ====== */
function renderR8List(){
  const box = $("r8List"); box.innerHTML = "";

  const filteredOrder = ORDER.filter(n => {
    const r = DB[n] || {};
    const hasKU = Number.isFinite(r?.k) && r?.u && [r.u.hp, r.u.atk, r.u.def, r.u.agi].every(Number.isFinite);
    const r8Entry = R8_DB[n];
    const hasR8 = r8Entry && ((Array.isArray(r8Entry) && r8Entry.length > 0) || (r8Entry.obs_100_rank8 && r8Entry.obs_100_rank8.length > 0));

    if (currentR8Filter === 'todo_r8') return hasKU && !hasR8;
    if (currentR8Filter === 'has_r8') return hasR8;
    // no_ku 제거됨
    return true; 
  });

  filteredOrder.forEach(n=>{
    const r = DB[n]||{};
    const hasKU = Number.isFinite(r?.k) && r?.u && [r.u.hp,r.u.atk,r.u.def,r.u.agi].every(Number.isFinite);
    const r8Entry = R8_DB[n];
    const hasR8 = r8Entry && ((Array.isArray(r8Entry) && r8Entry.length > 0) || (r8Entry.obs_100_rank8 && r8Entry.obs_100_rank8.length > 0));

    const lab = document.createElement('label');
    lab.className = "r8item" + (hasKU ? "" : " disabled");

    const cb = document.createElement('input');
    cb.type = "checkbox"; cb.value = n; cb.disabled = !hasKU;
    lab.appendChild(cb);

    const nameSpan = document.createElement('span'); nameSpan.className = "name"; nameSpan.textContent = n;
    lab.appendChild(nameSpan);

    const extra = document.createElement('span'); extra.className = "extra";
    
    if(hasR8){ const tag = document.createElement('span'); tag.className="tag ok"; tag.textContent="100% 완료"; extra.appendChild(tag); }
    if(r?.ku_override){ const tag = document.createElement('span'); tag.className="tag warn"; tag.textContent="override"; extra.appendChild(tag); }
    if(!hasKU){ const tag = document.createElement('span'); tag.className="tag"; tag.textContent="k/u 없음"; extra.appendChild(tag); }
    
    lab.appendChild(extra); box.appendChild(lab);
  });
}

$("btnR8Run").addEventListener("click", async ()=>{
  const picks = Array.from(document.querySelectorAll("#r8List input[type=checkbox]:checked")).map(cb=>cb.value);
  if(picks.length===0){ alert("대상을 선택하세요."); return; }

  R8_RESULT = {}; const skipped = []; const started = performance.now();

  for(const name of picks){
    const row = DB[name];
    if(!(Number.isFinite(row?.k) && row?.u)){ skipped.push({name,reason:"k/u 없음"}); continue; }
    const sets = collectR8ObsForKU(row.k, row.u); R8_RESULT[name] = sets || [];
  }
  const ms = Math.round(performance.now()-started);
  const totalSets = Object.values(R8_RESULT).reduce((a,arr)=>a+(arr?.length||0),0);

  const pre = $("r8Preview"); pre.style.display="block"; pre.className = "callout ok";
  pre.innerHTML = `
    <div><b>집계 완료</b> — 대상 ${picks.length}종, 결과 총 <b>${totalSets}</b> 세트, 시간 ${ms}ms</div>
    ${skipped.length? `<div style="margin-top:6px" class="muted">스킵: ${skipped.map(s=>`${s.name}(${s.reason})`).join(', ')}</div>` : ''}
    <details style="margin-top:8px; cursor:pointer;"><summary style="outline:none; color:var(--text-main);">상세 미리보기</summary>
      ${Object.keys(R8_RESULT).length===0 ? '<div class="muted" style="margin-top:8px;">없음</div>' : `
        <table style="width:100%; margin-top:12px; border-collapse:collapse; text-align:left; font-size:13px;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
              <th style="padding:6px; color:var(--text-sub);">이름</th>
              <th style="padding:6px; color:var(--text-sub);">세트 수</th>
              <th style="padding:6px; color:var(--text-sub);">예시</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(R8_RESULT).map(([n,arr])=>{
              const ex = (arr[0] ? `(${arr[0].join(', ')})` : '-');
              return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td style="padding:6px;">${n}</td><td style="padding:6px; color:var(--accent); font-weight:700;">${arr.length}</td><td style="padding:6px;" class="mono muted">${ex}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      `}
    </details>
  `;
  $("btnR8Commit").disabled = Object.keys(R8_RESULT).length===0;
});

$("btnR8Commit").addEventListener("click", async ()=>{
  if(Object.keys(R8_RESULT).length===0){ alert("먼저 집계를 실행하세요."); return; }
  const token = prompt("GitHub Personal Access Token 입력(권한: repo, contents)");
  if(!token){ alert("토큰이 필요합니다."); return; }

  const metaUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(R8_PATH)}?ref=${GH_BRANCH}`;
  let remoteMap = {}; let sha = null;

  const head = await fetch(metaUrl, {headers:{Accept:"application/vnd.github+json"}});
  if(head.status===200){
    const meta = await head.json(); sha = meta.sha;
    remoteMap = R8_DB || {}; 
    if (Object.keys(remoteMap).length === 0) { try { const text = await fetch(REMOTE_R8).then(r=>r.text()); remoteMap = JSON.parse(text); } catch { remoteMap = {}; } }
  }else if(head.status!==404){ alert("full.json 메타 조회 실패: HTTP "+head.status); return; } else { remoteMap = {}; sha = null; }

  const out = {...remoteMap};
  for(const [name, sets] of Object.entries(R8_RESULT)){
    const prev = (remoteMap[name]?.obs_100_rank8) || remoteMap[name] || [];
    const prevStr = new Set(prev.map(a=>a.join(','))); const merged = [...prev];
    sets.forEach(a=>{ const k=a.join(','); if(!prevStr.has(k)) merged.push(a); });
    out[name] = { obs_100_rank8: merged, count: merged.length };
  }

  const res = await fetch(metaUrl, {
    method:"PUT", headers:{ "Authorization":`Bearer ${token}`, "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify({
      message: prompt("커밋 메시지 입력", "feat(admin): update guaranteed_rank8.full.json (auto from admin)") || "update guaranteed_rank8.full.json",
      content: btoa(unescape(encodeURIComponent(JSON.stringify(out, null, 2)))), branch: GH_BRANCH, ...(sha? {sha}: {})
    })
  });
  if(!res.ok){ const t = await res.text().catch(()=>"(no body)"); alert("커밋 실패: " + res.status + "\n" + t); return; }
  alert("guaranteed_rank8.full.json 커밋 성공!"); R8_DB = out; renderR8List();
});

/* ====== 데이터 로드 ====== */
async function loadRemote(){
  const obj = await fetchJSON(REMOTE_PETS);
  DB = (obj && !obj.__404__) ? obj : {}; sortNames(); renderList(); if(ORDER.length && !CURRENT) loadForm(ORDER[0]); saveLS();
}
(async function init(){
  const local = loadLS();
  if(local && typeof local==="object"){ DB = local; sortNames(); renderList(); }
  try{ await loadRemote(); }catch(e){ console.warn("원격 로드 실패, 로컬 캐시로 동작", e); if(!local){ DB={}; renderList(); } }
  try { const r8_obj = await fetchJSON(REMOTE_R8); R8_DB = (r8_obj && !r8_obj.__404__) ? r8_obj : {}; } catch(e) { console.warn("R8 원격 로드 실패, 빈 객체로 동작", e); R8_DB = {}; }
  renderR8List(); if(ORDER.length && !CURRENT) loadForm(ORDER[0]); 
})();
</script>
