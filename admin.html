<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Together PET Admin — 일괄 추정 및 선택 기능 추가</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#161a22; --muted:#8a9099; --accent:#6aa0ff;
    --ok:#35c759; --warn:#ffb300; --bad:#ff5171; --chip:#232a36;
    --ring:#1f2530; --text:#e8ecf3; --highlight:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0; background:#0f1115; color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #232a36;background:#0c1016;position:sticky;top:0;z-index:10}
  .brand{font-weight:700}
  .grid{max-width:1200px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns: 360px 1fr;gap:14px}
  .card{background:#161a22;border:1px solid #232a36;border-radius:12px; padding:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .col{flex:1 1 0}
  label{display:block;font-size:12px;color:var(--muted);margin:6px 0 4px 2px}
  input,textarea,select{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid #2a3040;
    background:#0e1218; color:var(--text); outline:none; font-size:14px;
  }
  textarea{min-height:84px; resize:vertical}
  .btn{padding:10px 12px;border-radius:10px;border:1px solid #334055;background:#142033;color:#cfe1ff;cursor:pointer;font-weight:600}
  .btn:hover{filter:brightness(1.06)}
  .btn.primary{background:linear-gradient(180deg,#2b71ff,#1d56cc);border-color:transparent;color:white}
  .btn.ghost{background:transparent}
  .btn-sm{padding: 6px 10px; font-size: 12px; border-radius: 8px;}
  .filter-btn.active{ background: #142033; color: #cfe1ff; border-color: #334055; }
  .btn.warn{border-color:#7a1e2e;background:#2a0f16;color:#ff8aa0}
  .list{max-height:50vh;overflow:auto;border:1px solid #2a3040;border-radius:10px}
  .item{padding:10px 12px;border-bottom:1px solid #222836;display:grid;grid-template-columns: 24px 1fr auto;align-items:center;gap:8px;cursor:pointer}
  .item:hover{background:#141924}
  .item input[type=checkbox] { width:16px; height:16px; cursor: pointer; }
  .muted{color:var(--muted)}
  .tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .tag{font-size:11px;border:1px solid #2b3242;border-radius:999px;padding:2px 8px}
  .tag.ok{border-color:#275a34;background:#102214;color:#35c759}
  .tag.warn{border-color:#7a5b0e;background:#241a05;color:#ffb300}
  .tag.bad{border-color:#5a1e2a;background:#201016;color:#ff7e92}
  .grid2{display:grid;grid-template-columns: repeat(4,1fr);gap:8px}
  .grid3{display:grid;grid-template-columns: repeat(3,1fr);gap:8px}
  .hr{height:1px;background:#242a36;margin:10px -12px}
  .note{font-size:12px;color:#b8bfd0}
  .callout{border:1px solid #334055;background:#0f1420;border-radius:10px;padding:10px 12px}
  .callout.bad{border-color:#5a1e2a;background:#1a0f14}
  .callout.ok{border-color:#275a34;background:#0f1912}
  .right{display:flex;gap:8px;align-items:center}
  .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace}

  .r8list{max-height:36vh; overflow:auto; border:1px solid #2a3040; border-radius:10px; padding:6px}
  .r8item{
    display:grid;
    grid-template-columns: 22px 1fr auto; 
    gap:8px; align-items:center; padding:8px; border-bottom:1px solid #222836; border-radius:8px;
  }
  .r8item:last-child{border-bottom:none}
  .r8item input[type=checkbox]{ width:18px; height:18px; }
  .r8item.disabled{opacity:.55}
  .r8item .name{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .r8item .extra{display:flex; gap:6px; align-items:center; justify-self:end; flex-wrap:wrap}

  @media (max-width: 780px){
    .grid{grid-template-columns:1fr;gap:10px}
    header{flex-wrap:wrap;gap:8px}
    .list{max-height:32vh}
    input,textarea,select{font-size:16px;padding:12px 14px}
    .btn{padding:12px 14px}
    .grid2{grid-template-columns: repeat(2,1fr)}
    .grid3{grid-template-columns: repeat(2,1fr)}
    .r8item{ grid-template-columns: 24px 1fr; }
    .r8item .extra{ grid-column: 2 / 3; justify-self:start; margin-top:2px; }
  }

  body.locked{overflow:hidden}
  body.locked header, body.locked .grid{display:none}
  
  #gate{
    position:fixed; inset:0; z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background:rgba(15,17,21,.96)
  }
  
  #gate .panel{
    width:min(380px, 92vw); 
    background:#161a22; 
    border:1px solid #232a36; 
    border-radius:14px; 
    padding:24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  
  #gate h2{margin:0 0 10px; font-size:18px}
  
  #gate .input-row{
    display:flex; gap:8px; margin-top:12px;
  }
  
  #gate input[type="password"] {
    flex:1; padding:12px; border-radius:10px; border:1px solid #2a3040;
    background:#0e1218; color:#e8ecf3; outline:none; font-size:14px;
  }
  
  #gate button {
    padding:12px 18px; border-radius:10px; border:1px solid #334055;
    background:#142033; color:#cfe1ff; font-weight:600; cursor:pointer;
  }
  
  .remember-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; font-size: 13px; color: #8a9099; cursor: pointer;
  }
  .remember-wrap input[type="checkbox"] {
    width: 16px; height: 16px; margin: 0; cursor: pointer;
  }

  #gate .err{margin-top:8px; color:#ff7e92; font-size:13px; min-height:18px}
</style>
</head>
<body class="locked">

    <div class="panel">

        <button id="gate_btn">입장</button>
      </div>

  <div class="brand">Together PET Admin</div>
  <div class="right">
    <button class="btn" id="btnReload">원격 새로고침</button>

    <div class="row" style="margin-bottom:8px; gap:6px;" id="filterChips">

      <button class="btn ghost btn-sm filter-btn" data-filter="no_s0sg">S0/SG 미완</button>

      <input id="search" placeholder="이름 검색" />

    </div>

    <div class="row" style="margin-bottom:8px; gap:6px;">
      <button class="btn ghost btn-sm" id="btnListSelectAll">전체 선택</button>
      <button class="btn ghost btn-sm" id="btnListClearAll">해제</button>

    <div class="list" id="list"></div>

  <section class="card">

      <div class="col">

        <input id="name" placeholder="예: 골로스" />
      </div>

        <button class="btn ghost btn-sm" id="btnDecCalc" style="margin-left:auto">소숫점 계산</button>
      </div>

    </div>

    <div class="hr"></div>

    <div class="row">
      <button class="btn primary" id="btnSave">저장(브라우저)</button>

    </div>
  </section>

  <section class="card">
    <h3 style="margin:4px 0 10px">④ 환각(8등급) 100% 초기치 집계 & 커밋</h3>
    
    <div class="row" style="margin-bottom:8px; gap:6px;" id="r8FilterChips">
      <label style="margin:0; align-self:center; font-size:13px; color:var(--muted);">필터:</label>
      <button class="btn ghost btn-sm filter-btn active" data-filter="all">전체</button>
      <button class="btn ghost btn-sm filter-btn" data-filter="todo_r8">R8 작업</button>
      <button class="btn ghost btn-sm filter-btn" data-filter="has_r8">R8 있음</button>
    </div>

    <div class="row" style="align-items:center;margin-bottom:8px">
      <button class="btn btn-sm" id="btnR8SelectAll">모두 선택</button>
      <button class="btn ghost btn-sm" id="btnR8ClearAll">선택 해제</button>
    </div>
    <div class="r8list" id="r8List"></div>

    <div class="row" style="margin-top:10px">
      <button class="btn" id="btnR8Run">선택 대상 집계</button>
      <button class="btn primary" id="btnR8Commit" disabled>guaranteed_rank8.full.json 커밋</button>
    </div>
    <div id="r8Preview" class="callout" style="margin-top:10px; display:none"></div>

<script>
const ADMIN_PASSWORD_HASH = "67014614aeb1b3c1f8be8cb87b930f3e36683d403a928e8a49388c6d3021670f";
const LOGIN_TTL_MS = 2 * 60 * 60 * 1000;

async function sha256Hex(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function sessValid(){
  try{
    const s = JSON.parse(sessionStorage.getItem("Together_admin_ok")||"null");
    return !!(s && s.h===ADMIN_PASSWORD_HASH && (Date.now()-s.t) < LOGIN_TTL_MS);
  }catch{return false;}
}
function unlock(){ document.body.classList.remove("locked"); const g = $("gate"); if(g) g.remove(); }

document.addEventListener("DOMContentLoaded", ()=>{
  const pass = $("gate_pass"), btn = $("gate_btn"), err = $("gate_err"), rem = $("gate_rem");
  if(sessValid()){ unlock(); return; }
  async function tryLogin(){
    const p = pass.value; if(!p){ err.textContent="비밀번호를 입력하세요."; return; }
    const hex = await sha256Hex(p);
    if(hex === ADMIN_PASSWORD_HASH){ if(rem.checked) sessionStorage.setItem("Together_admin_ok", JSON.stringify({h:hex, t:Date.now()})); unlock(); }
    else{ err.textContent="틀렸습니다."; pass.value=""; }
  }
  btn.onclick = tryLogin;
  pass.onkeydown = e=>{ if(e.key==="Enter") tryLogin(); };
});
</script>

<script>
const GH_OWNER = "kkoby-daddy", GH_REPO = "kkoby_together", GH_BRANCH = "main";
const PETS_PATH = "data/pets.json", R8_PATH = "data/guaranteed_rank8.full.json";
const REMOTE_PETS = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${PETS_PATH}`;
const REMOTE_R8 = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${R8_PATH}`;
const LS_KEY = "adminPetsCache_v2";

let DB = {}, ORDER = [], CURRENT = null, currentFilter = 'all', currentR8Filter = 'all', R8_DB = {}, R8_RESULT = {};

function $(id){ return document.getElementById(id); }
function saveLS(){ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
function loadLS(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch{ return null; } }
function sortNames(){ ORDER = Object.keys(DB).sort((a,b)=>a.localeCompare(b,'ko')); }
const num = (v)=> (v===""||v==null||isNaN(+v)) ? null : +v;
function toFixed2(x){ return new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP).toNumber(); }

const ESET = Array.from({ length: 251 }, (_, i) => 650 - i);
function s0_from_k_u_jjyal(k, u){
  const fac = k/100;
  const v = [u.hp+4.5, u.atk+4.5, u.def+4.5, u.agi+4.5].map(x=>x*fac);
  return [Math.floor(v[0]*4+v[1]+v[2]+v[3]), Math.floor(v[0]*0.1+v[1]+v[2]*0.1+v[3]*0.05), Math.floor(v[0]*0.1+v[1]*0.1+v[2]+v[3]*0.05), Math.floor(v[3])];
}
function solveUFromSG_STRICT(SG,e){
  try{
    Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });
    const f = new Decimal(e).div(10000);
    const u_agi = new Decimal(SG.agi).times(10000).div(e).minus(4.5).round();
    const dP = u_agi.plus(4.5), r = [new Decimal(SG.hp).minus(dP.times(f)).div(f), new Decimal(SG.atk).minus(dP.times(f).times(0.05)).div(f), new Decimal(SG.def).minus(dP.times(f).times(0.05)).div(f)];
    let A = [[4,1,1,r[0]], [0.1,1,0.1,r[1]], [0.1,0.1,1,r[2]]].map(row=>row.map(v=>new Decimal(v)));
    for(let i=0;i<3;i++){
      let mr=i; for(let j=i+1;j<3;j++) if(A[j][i].abs().gt(A[mr][i].abs())) mr=j;
      [A[i], A[mr]] = [A[mr], A[i]]; const piv = A[i][i];
      for(let j=i;j<4;j++) A[i][j] = A[i][j].div(piv);
      for(let k=0;k<3;k++) if(k!==i){ const fac = A[k][i]; for(let j=i;j<4;j++) A[k][j] = A[k][j].minus(fac.times(A[i][j])); }
    }
    const u = { hp: +A[0][3].minus(4.5).round(), atk: +A[1][3].minus(4.5).round(), def: +A[2][3].minus(4.5).round(), agi: +u_agi };
    const r2 = x=>new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP);
    const chk = [r2(f.times((u.hp+4.5)*4+(u.atk+4.5)+(u.def+4.5)+(u.agi+4.5))), r2(f.times((u.hp+4.5)*0.1+(u.atk+4.5)+(u.def+4.5)*0.1+(u.agi+4.5)*0.05)), r2(f.times((u.hp+4.5)*0.1+(u.atk+4.5)*0.1+(u.def+4.5)+(u.agi+4.5)*0.05)), r2(f.times(u.agi+4.5))];
    if(chk[0].eq(r2(SG.hp)) && chk[1].eq(r2(SG.atk)) && chk[2].eq(r2(SG.def)) && chk[3].eq(r2(SG.agi))) return {u, e};
    return null;
  }catch{return null;}
}
function inferKU_STRICT(S0, SG){
  const sInt = S0.map(x=>Math.floor(x));
  for(const e of ESET){
    const sol = solveUFromSG_STRICT(SG, e); if(!sol) continue;
    for(let k=10;k<=100;k++){
      const s = s0_from_k_u_jjyal(k, sol.u);
      if(s[0]===sInt[0] && s[1]===sInt[1] && s[2]===sInt[2] && s[3]===sInt[3]) return {k, u:sol.u, e:sol.e};
    }
  }
  return null;
}

function renderList(){
  const kw = ($("search").value||"").trim();
  const filtered = ORDER.filter(n => {
    const r = DB[n] || {};
    if(currentFilter === 'no_s0sg') return !([r.s0?.hp, r.s0?.atk, r.s0?.def, r.s0?.agi, r.sg?.hp, r.sg?.atk, r.sg?.def, r.sg?.agi].every(Number.isFinite));
    if(currentFilter === 'no_ku') return !(r.ku_override || (Number.isFinite(r.k) && r.u));
    return true;
  }).filter(n => !kw || n.includes(kw));

  const list = $("list"); list.innerHTML = "";
  if(!filtered.length){ list.innerHTML = '<div class="item">결과 없음</div>'; return; }

  filtered.forEach(n => {
    const r = DB[n]||{}, it = document.createElement('div'); it.className = "item";
    const cb = document.createElement('input'); cb.type="checkbox"; cb.className="list-chk"; cb.value=n;
    cb.onclick = e => e.stopPropagation();
    
    const nameSpan = document.createElement('span'); nameSpan.textContent = n;
    const tags = document.createElement('div'); tags.className="tags";
    const s0sg_ok = [r.s0?.hp, r.s0?.atk, r.s0?.def, r.s0?.agi, r.sg?.hp, r.sg?.atk, r.sg?.def, r.sg?.agi].every(Number.isFinite);
    const t1 = document.createElement('span'); t1.className="tag "+(s0sg_ok?"ok":"warn"); t1.textContent=s0sg_ok?"S0/SG":"미완";
    tags.appendChild(t1);
    if(r.ku_override || (Number.isFinite(r.k) && r.u)){ const t2=document.createElement('span'); t2.className="tag warn"; t2.textContent="k/u"; tags.appendChild(t2); }
    
    it.append(cb, nameSpan, tags);
    it.onclick = () => loadForm(n);
    list.appendChild(it);
  });
}

function loadForm(name){
  CURRENT = name; const r = DB[name] || {};
  $("name").value = name; $("note").value = r.note || "";
  ["hp","atk","def","agi"].forEach(s => { $("s0_"+s).value = r.s0?.[s] ?? ""; $("sg_"+s).value = r.sg?.[s] ?? ""; $("ku_"+s).value = r.u?.[s] ?? ""; });
  $("ovr_check").checked = !!r.ku_override; $("ku_k").value = r.k ?? "";
  updateConsistency();
}

function gatherForm(){
  const f = { name:$("name").value.trim(), note:$("note").value, ovr:$("ovr_check").checked, k:num($("ku_k").value) };
  f.s0 = { hp:num($("s0_hp").value), atk:num($("s0_atk").value), def:num($("s0_def").value), agi:num($("s0_agi").value) };
  f.sg = { hp:num($("sg_hp").value), atk:num($("sg_atk").value), def:num($("sg_def").value), agi:num($("sg_agi").value) };
  f.u = { hp:num($("ku_hp").value), atk:num($("ku_atk").value), def:num($("ku_def").value), agi:num($("ku_agi").value) };
  return f;
}

function updateConsistency(){
  const box = $("consistency"); box.style.display="none"; const f = gatherForm();
  if(!f.ovr || !Number.isFinite(f.k) || !Object.values(f.u).every(Number.isFinite) || !Object.values(f.s0).every(v=>v!=null) || !Object.values(f.sg).every(v=>v!=null)) return;
  
  const pred = s0_from_k_u_jjyal(f.k, f.u), real = [f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi].map(v=>Math.floor(v));
  const okS0 = pred.every((v,i)=>v===real[i]);
  const e = new Decimal(f.sg.agi).times(10000).div(new Decimal(f.u.agi).plus(4.5)), fct = e.div(10000);
  const r2 = x=>new Decimal(x).toDecimalPlaces(2, Decimal.ROUND_HALF_UP).toNumber();
  const hpC = r2(fct.times((f.u.hp+4.5)*4+(f.u.atk+4.5)+(f.u.def+4.5)+(f.u.agi+4.5)));
  const okSG = toFixed2(hpC - f.sg.hp) === 0;

  box.innerHTML = `<strong>일관성 검사</strong>: S0 ${okS0?'OK':'불일치'}, SG ${okSG?'OK':'차이'}, e≈${e.toFixed(2)}`;
  box.className = "callout " + (okS0&&okSG?'ok':'bad'); box.style.display="block";
}

// 필터 및 선택 이벤트
$("filterChips").onclick = e => {
  const b = e.target.closest(".filter-btn"); if(!b) return;
  currentFilter = b.dataset.filter;
  document.querySelectorAll("#filterChips .filter-btn").forEach(x=>x.classList.toggle("active", x===b));
  renderList();
};
$("btnListSelectAll").onclick = () => document.querySelectorAll(".list-chk").forEach(c => c.checked=true);
$("btnListClearAll").onclick = () => document.querySelectorAll(".list-chk").forEach(c => c.checked=false);

// 일괄 추정 기능
$("btnBatchSolve").onclick = () => {
  const picks = Array.from(document.querySelectorAll(".list-chk:checked")).map(c=>c.value);
  if(!picks.length) return alert("대상을 선택하세요.");
  if(!confirm(`${picks.length}개의 페트를 일괄 추정 및 저장하시겠습니까?\n(기존 k/u 값이 덮어씌워집니다)`)) return;

  let ok=0, fail=0;
  picks.forEach(n => {
    const r = DB[n]; if(!r || !r.s0 || !r.sg) { fail++; return; }
    const sol = inferKU_STRICT([r.s0.hp, r.s0.atk, r.s0.def, r.s0.agi], r.sg);
    if(sol){ r.k=sol.k; r.u=sol.u; r.ku_override=true; ok++; } else { fail++; }
  });
  saveLS(); renderList(); renderR8List();
  alert(`일괄 작업 완료\n성공: ${ok}, 실패: ${fail}`);
};

$("btnSolve").onclick = () => {
  const f = gatherForm(); const sol = inferKU_STRICT([f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi], f.sg);
  if(!sol) return alert("해를 찾을 수 없습니다.");
  $("ku_k").value = sol.k; ["hp","atk","def","agi"].forEach(s=>$("ku_"+s).value=sol.u[s]);
  $("ovr_check").checked = true; updateConsistency();
};

$("btnSave").onclick = () => {
  const f = gatherForm(); if(!f.name) return alert("이름 필수");
  if(CURRENT && CURRENT!==f.name){ DB[f.name]=DB[CURRENT]; delete DB[CURRENT]; CURRENT=f.name; }
  const r = DB[f.name] || {}; r.s0=f.s0; r.sg=f.sg; r.note=f.note;
  if(f.ovr){ r.k=f.k; r.u=f.u; r.ku_override=true; } else { delete r.k; delete r.u; delete r.ku_override; }
  DB[f.name]=r; sortNames(); renderList(); renderR8List(); saveLS(); alert("저장됨");
};

$("btnDecCalc").onclick = () => {
  const f = gatherForm(); const sol = f.ovr && f.k ? {k:f.k, u:f.u} : inferKU_STRICT([f.s0.hp,f.s0.atk,f.s0.def,f.s0.agi], f.sg);
  if(!sol) return alert("데이터 부족");
  const fac = new Decimal(sol.k).div(100), u = sol.u, v = [u.hp+4.5,u.atk+4.5,u.def+4.5,u.agi+4.5].map(x=>new Decimal(x).times(fac));
  const s0r = { hp:v[0].times(4).plus(v[1]).plus(v[2]).plus(v[3]), atk:v[0].times(0.1).plus(v[1]).plus(v[2].times(0.1)).plus(v[3].times(0.05)), def:v[0].times(0.1).plus(v[1].times(0.1)).plus(v[2]).plus(v[3].times(0.05)), agi:v[3] };
  $("s0_hp").value=s0r.hp.toFixed(2); $("s0_atk").value=s0r.atk.toFixed(2); $("s0_def").value=s0r.def.toFixed(2); $("s0_agi").value=s0r.agi.toFixed(2);
  $("decPanel").innerHTML = `<strong>실제 S0</strong>: ${s0r.hp.toFixed(4)} / ${s0r.atk.toFixed(4)} / ${s0r.def.toFixed(4)} / ${s0r.agi.toFixed(4)}`;
  $("decPanel").style.display="block"; updateConsistency();
};

// R8 관련
function renderR8List(){
  const list = $("r8List"); list.innerHTML = "";
  ORDER.filter(n => {
    const r = DB[n] || {}, hasKU = Number.isFinite(r.k) && r.u, r8Entry = R8_DB[n];
    const hasR8 = r8Entry && (Array.isArray(r8Entry)? r8Entry.length : r8Entry.obs_100_rank8?.length);
    if(currentR8Filter==='todo_r8') return hasKU && !hasR8;
    if(currentR8Filter==='has_r8') return hasR8;
    return true;
  }).forEach(n => {
    const r = DB[n]||{}, hasKU = Number.isFinite(r.k) && r.u;
    const lab = document.createElement('label'); lab.className="r8item "+(hasKU?'':'disabled');
    lab.innerHTML = `<input type="checkbox" value="${n}" ${hasKU?'':'disabled'}> <span class="name">${n}</span> <span class="extra">${r.ku_override?'<span class="tag warn">ovr</span>':''}</span>`;
    list.appendChild(lab);
  });
}
$("r8FilterChips").onclick = e => {
  const b = e.target.closest(".filter-btn"); if(!b) return;
  currentR8Filter = b.dataset.filter;
  document.querySelectorAll("#r8FilterChips .filter-btn").forEach(x=>x.classList.toggle("active", x===b));
  renderR8List();
};

// 초기화 로드
async function loadRemote(){
  try{
    const p = await fetch(REMOTE_PETS+"?v="+Date.now()).then(r=>r.json()); DB = p||{};
    const r8 = await fetch(REMOTE_R8+"?v="+Date.now()).then(r=>r.json()); R8_DB = r8||{};
    sortNames(); renderList(); renderR8List(); if(ORDER.length) loadForm(ORDER[0]); saveLS();
  }catch(e){ console.error(e); }
}

(async function init(){
  const local = loadLS(); if(local) { DB = local; sortNames(); renderList(); }
  await loadRemote();
})();

// 기타 버튼
$("btnReload").onclick = loadRemote;
$("btnNew").onclick = () => { const n = prompt("이름?"); if(n && !DB[n]) { DB[n]={}; sortNames(); renderList(); loadForm(n); } };
$("search").oninput = renderList;
$("btnExport").onclick = () => {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="pets.json"; a.click();
};
["ovr_check","ku_k","ku_hp","ku_atk","ku_def","ku_agi","s0_hp","s0_atk","s0_def","s0_agi","sg_hp","sg_atk","sg_def","sg_agi"].forEach(id => $(id).oninput = updateConsistency);
$("btnClearKU").onclick = () => { $("ovr_check").checked=false; ["k","hp","atk","def","agi"].forEach(s=>$("ku_"+(s==='k'?'k':s)).value=""); updateConsistency(); };

// 커밋 (간략화)
async function commitPets(){
  const token = prompt("GitHub Token?"); if(!token) return;
  const meta = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(PETS_PATH)}?ref=${GH_BRANCH}`).then(r=>r.json());
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(PETS_PATH)}`, {
    method:"PUT", headers:{"Authorization":`Bearer ${token}`},
    body: JSON.stringify({ message:"update pets", content: btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2)))), branch:GH_BRANCH, sha:meta.sha })
  });
  alert(res.ok?"성공":"실패");
}
$("btnCommit").onclick = commitPets;
$("btnSaveCommit").onclick = () => { $("btnSave").click(); commitPets(); };
